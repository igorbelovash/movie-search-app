<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/movie-search-app/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FilmHub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/movie-search-app/index.js"></script>
  <link rel="modulepreload" crossorigin href="/movie-search-app/assets/vendor-DfocyEbf.js">
  <link rel="stylesheet" crossorigin href="/movie-search-app/assets/vendor-DnveWo0P.css">
  <link rel="stylesheet" crossorigin href="/movie-search-app/assets/index-CvqSwRKM.css">
</head>

<body>
  <header class="header">
    <div class="container header-container">
        <button type="button" class="sidebar-open-btn">
            <svg class="menu-icon-btn" width="20" height="20">
                <use href="/movie-search-app/assets/sprite-Dfi2T5pv.svg#icon-menu"></use>
            </svg>
        </button>
        <nav class="header-navigation">
            <ul class="header-menu-list">
                <li class="header-menu-item">
                    <a href="./index.html" class="header-menu-link current">Movies</a>
                </li>
                <li class="header-menu-item">
                    <a href="./index.html" class="header-menu-link current">Series</a>
                </li>
                <li class="header-menu-item">
                    <a href="./index.html" class="header-menu-link current">Cartoons</a>
                </li>
            </ul>
        </nav>
        <form id="search" class="header-search-form">
            <input type="text" id="search-field" class="header-search-input" autocomplete="off" placeholder="Search">
            <button type="button" class="search-open-btn">
                <svg class="header-search-icon" width="20" height="20">
                    <use href="/movie-search-app/assets/sprite-Dfi2T5pv.svg#icon-search"></use>
                </svg>
            </button>
            <div id="search-results" class="search-results">
                <ul class="search-section-list">
                </ul>
            </div>
        </form>
    </div>
</header>
  <main class="main">
    <section class="section trending">
    <div class="container">
        <h2 class="trending-title">Trending</h2>
        <div class="slider-box">
            <button type="button" class="slider-arrow prev-btn">
                <svg class="prev-icon-btn" width="20" height="20">
                    <use href="/movie-search-app/assets/sprite-Dfi2T5pv.svg#icon-arrow-left"></use>
                </svg>
            </button>
            <div class="movie-list-container">
                <ul class="movie-list">
                </ul>
            </div>
            <button type="button" class="slider-arrow next-btn">
                <svg class="next-icon-btn" width="20" height="20">
                    <use href="/movie-search-app/assets/sprite-Dfi2T5pv.svg#icon-arrow-right"></use>
                </svg>
            </button>
        </div>
        <button type="button" class="load-more-btn hidden">Load more</button>
    </div>
</section>
  </main>
</body>

</html>
