<section class="section trending">

        <div class="slider-box">
            <button type="button" class="slider-arrow prev-btn">
                <svg class="prev-icon-btn" width="20" height="20">
                    <use href="/img/sprite.svg#icon-arrow-left"></use>
                </svg>
            </button>
            <div class="movie-list-container">
                <ul class="movie-list">

                </svg>
            </button>
        </div>
        <button type="button" class="load-more-btn hidden">Load more</button>
    </div>
